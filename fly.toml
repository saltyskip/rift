app = "rift-api"
primary_region = "iad"

[build]
  dockerfile = "server/Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "stop"
  min_machines_running = 1

  [http_service.checks]
    [http_service.checks.health]
      interval = "10s"
      timeout = "5s"
      grace_period = "30s"
      method = "get"
      path = "/health"
