name: CLI Release

on:
  push:
    branches: [main]
    paths:
      - 'client/cli/**'
      - 'client/core/**'
      - '.github/workflows/cli-release.yml'
  workflow_dispatch:

concurrency:
  group: cli-release
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  meta:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      skip: ${{ steps.version.outputs.skip }}
      bumped: ${{ steps.version.outputs.bumped }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine CLI version
        id: version
        # Versioning rules:
        # - First release ever: publish the Cargo.toml version as-is.
        # - Cargo.toml > latest tag: respect the manual bump (typically a
        #   minor / major bump in a feature PR). Publish as-is.
        # - Cargo.toml == latest tag: auto-bump the patch and publish. This
        #   is the common case — every merged PR touching client/cli/** or
        #   client/core/** ships a patch release.
        # - Cargo.toml < latest tag: error. Likely a botched manual edit.
        #
        # The auto-bump commit on `main` carries `[skip ci]` so it doesn't
        # re-fire the workflow.
        run: |
          set -eo pipefail
          CURRENT=$(grep '^version' client/cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          LATEST_TAG=$(git ls-remote --tags origin 'refs/tags/rift-cli-v*' \
            | awk -F/ '{print $NF}' \
            | sed 's/\^{}$//' \
            | sort -u \
            | sort -V \
            | tail -1)

          if [ -z "$LATEST_TAG" ]; then
            NEW_VERSION="$CURRENT"
            BUMPED="false"
            echo "No prior rift-cli tags — publishing $CURRENT as first release."
          else
            LATEST="${LATEST_TAG#rift-cli-v}"
            if [ "$CURRENT" = "$LATEST" ]; then
              MAJOR=$(echo "$CURRENT" | cut -d. -f1)
              MINOR=$(echo "$CURRENT" | cut -d. -f2)
              PATCH=$(echo "$CURRENT" | cut -d. -f3)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              BUMPED="true"
              echo "Cargo.toml ($CURRENT) matches latest tag — auto-bumping to $NEW_VERSION."
            elif printf '%s\n%s\n' "$LATEST" "$CURRENT" | sort -VC; then
              NEW_VERSION="$CURRENT"
              BUMPED="false"
              echo "Manual bump detected ($LATEST → $CURRENT) — publishing as-is."
            else
              echo "::error::Cargo.toml version $CURRENT is older than latest tag $LATEST. Refusing to publish."
              exit 1
            fi
          fi

          NEW_TAG="rift-cli-v$NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "bumped=$BUMPED" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify CLI
    runs-on: ubuntu-latest
    needs: meta
    if: needs.meta.outputs.skip != 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            client/core
            client/cli

      - name: Apply auto-bump
        if: needs.meta.outputs.bumped == 'true'
        run: perl -i -pe 's/^version = "[^"]*"/version = "${{ needs.meta.outputs.version }}"/' client/cli/Cargo.toml

      - name: Format check
        run: cargo fmt --manifest-path client/cli/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path client/cli/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path client/cli/Cargo.toml

  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    needs: [meta, verify]
    if: needs.meta.outputs.skip != 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            binary: rift
          - os: ubuntu-latest
            label: linux-arm64
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            binary: rift
          - os: macos-14
            label: macos-arm64
            target: aarch64-apple-darwin
            archive: tar.gz
            binary: rift
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            archive: zip
            binary: rift.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            client/core
            client/cli

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Apply auto-bump
        if: needs.meta.outputs.bumped == 'true'
        shell: bash
        # `perl -i` works identically on Linux, macOS, and Windows-with-Git-Bash.
        # GNU sed -i and BSD sed -i '' are not portable across all matrix entries.
        run: perl -i -pe 's/^version = "[^"]*"/version = "${{ needs.meta.outputs.version }}"/' client/cli/Cargo.toml

      - name: Build release binary
        run: cargo build --manifest-path client/cli/Cargo.toml --release --target ${{ matrix.target }}

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          NAME="rift-${VERSION}-${{ matrix.label }}"
          mkdir -p dist/$NAME
          cp "client/cli/target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/$NAME/rift"
          tar -czf "dist/${NAME}.tar.gz" -C dist "$NAME"

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.meta.outputs.version }}"
          $name = "rift-$version-${{ matrix.label }}"
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "client/cli/target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/$name/rift.exe"
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: dist/*
          retention-days: 5

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [meta, build]
    if: needs.meta.outputs.skip != 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: dtolnay/rust-toolchain@stable
        if: needs.meta.outputs.bumped == 'true'

      - name: Apply auto-bump + refresh lockfile
        if: needs.meta.outputs.bumped == 'true'
        run: |
          perl -i -pe 's/^version = "[^"]*"/version = "${{ needs.meta.outputs.version }}"/' client/cli/Cargo.toml
          # Refresh the lockfile entry so it tracks the new package version.
          # `--workspace` is harmless; `--offline` would fail if the registry
          # cache is cold, so let cargo touch the network.
          cargo update --manifest-path client/cli/Cargo.toml -p rift-cli --precise ${{ needs.meta.outputs.version }} || \
            cargo build --manifest-path client/cli/Cargo.toml --offline 2>/dev/null || \
            cargo build --manifest-path client/cli/Cargo.toml

      - name: Commit and push auto-bump
        if: needs.meta.outputs.bumped == 'true'
        # `[skip ci]` keeps this commit from re-firing the workflow.
        # Without it we'd loop: bump → push → trigger workflow → bump again.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add client/cli/Cargo.toml client/cli/Cargo.lock
          git commit -m "chore(cli): bump to v${{ needs.meta.outputs.version }} [skip ci]"
          git push origin HEAD:main

      - name: Create Git tag
        run: git tag "${{ needs.meta.outputs.tag }}" HEAD

      - name: Push Git tag
        run: git push origin "${{ needs.meta.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: "Rift CLI ${{ needs.meta.outputs.version }}"
          make_latest: false
          body: |
            ## Rift CLI ${{ needs.meta.outputs.version }}

            ### Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/saltyskip/rift/main/client/cli/install.sh | sh
            ```

            Or install from source:

            ```bash
            cargo install --git https://github.com/saltyskip/rift.git rift-cli
            ```

            Or download a prebuilt binary for your platform below.
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
