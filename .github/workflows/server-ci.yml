name: Server CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Manual one-click deploy of any branch to sandbox:
  #   gh workflow run server-ci.yml --ref <branch>
  # (or the "Run workflow" button in the Actions tab). Runs lint + test, then
  # deploy-sandbox only — deploy-prod stays gated to pushes on main.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # `lint` and `test` run concurrently on separate runners. clippy (a
  # check pass) and cargo test (a codegen pass) don't share compiled
  # artifacts anyway, so splitting them costs no extra compile work — it
  # just turns clippy+test wall-clock from a sum into a max.
  #
  # Shared CI env across both jobs:
  #   CARGO_INCREMENTAL=0   — incremental is pure overhead in CI, bloats cache.
  #   CARGO_PROFILE_*_DEBUG=0 — no debuginfo: cuts codegen + link time. Only
  #     touches dev/test profiles here; the deployed release binary is built
  #     separately by the Dockerfile and is unchanged.
  lint:
    name: Lint
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Format check
        run: cargo fmt -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server
      - name: Test
        run: cargo test

  deploy-sandbox:
    name: Deploy to Sandbox
    needs: [lint, test]
    if: github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/main' && github.event_name == 'push')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy sandbox
        working-directory: server
        run: flyctl deploy --config fly.sandbox.toml --remote-only --build-arg GIT_SHA=$(git rev-parse --short=12 HEAD)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Wait for sandbox to be healthy
        run: |
          for i in {1..30}; do
            if curl -fsS https://rift-api-sandbox.fly.dev/health > /dev/null; then
              echo "Sandbox healthy"; exit 0
            fi
            echo "Attempt $i: sandbox not healthy yet, retrying..."; sleep 5
          done
          echo "Sandbox failed to become healthy"; exit 1

  deploy-prod:
    name: Deploy to Prod
    needs: deploy-sandbox
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy server/ --remote-only --build-arg GIT_SHA=$(git rev-parse --short=12 HEAD)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
