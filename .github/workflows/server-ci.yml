name: Server CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      # CI never needs incremental artifacts (clean-ish builds) — disabling
      # it speeds compilation and shrinks the rust-cache.
      CARGO_INCREMENTAL: 0
      # No debuginfo in CI: codegen + linking is a large chunk of build time
      # and we don't need stack-trace line numbers here. Only affects the
      # dev/test profiles in this job — the deployed release binary is built
      # separately by the Dockerfile and is unchanged.
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      # No standalone `cargo build --all-targets` — `clippy --all-targets`
      # type-checks every target and `cargo test` codegens + runs the rest,
      # so a dedicated build pass is redundant (a whole extra codegen pass).
      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  deploy-sandbox:
    name: Deploy to Sandbox
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy sandbox
        working-directory: server
        run: flyctl deploy --config fly.sandbox.toml --remote-only --build-arg GIT_SHA=$(git rev-parse --short=12 HEAD)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Wait for sandbox to be healthy
        run: |
          for i in {1..30}; do
            if curl -fsS https://rift-api-sandbox.fly.dev/health > /dev/null; then
              echo "Sandbox healthy"; exit 0
            fi
            echo "Attempt $i: sandbox not healthy yet, retrying..."; sleep 5
          done
          echo "Sandbox failed to become healthy"; exit 1

  deploy-prod:
    name: Deploy to Prod
    needs: deploy-sandbox
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy server/ --remote-only --build-arg GIT_SHA=$(git rev-parse --short=12 HEAD)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
