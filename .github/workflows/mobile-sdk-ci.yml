name: Mobile SDK CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'client/mobile/**'
  push:
    branches: [main]
    paths:
      - 'client/mobile/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: SDK Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/mobile

      - name: Format check
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

  flutter-dart-gen:
    name: Flutter Dart Binding Generation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/mobile

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen

      - name: Generate Dart bindings
        run: |
          mkdir -p flutter_dart_wrappers/lib/src/rust
          flutter_rust_bridge_codegen generate \
            --rust-input crate::api \
            --rust-root flutter_ffi/ \
            --dart-root flutter_dart_wrappers/ \
            --dart-output flutter_dart_wrappers/lib/src/rust/frb_generated.dart

      - name: Verify generated files
        run: |
          test -f flutter_dart_wrappers/lib/src/rust/frb_generated.dart
          echo "Dart bindings generated successfully"
