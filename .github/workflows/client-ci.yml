name: Client CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'client/core/**'
      - 'client/cli/**'
  push:
    branches: [main]
    paths:
      - 'client/core/**'
      - 'client/cli/**'

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    name: Client Core
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/core

      - name: Format check
        run: cargo fmt --manifest-path client/core/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path client/core/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path client/core/Cargo.toml

  cli:
    name: CLI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            client/core
            client/cli

      - name: Format check
        run: cargo fmt --manifest-path client/cli/Cargo.toml -- --check

      - name: Clippy
        run: cargo clippy --manifest-path client/cli/Cargo.toml --all-targets -- -D warnings

      - name: Test
        run: cargo test --manifest-path client/cli/Cargo.toml
