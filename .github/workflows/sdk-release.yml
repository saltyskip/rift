name: SDK Release

on:
  push:
    branches: [main]
    paths:
      - 'client/mobile/**'
  workflow_dispatch:

concurrency:
  group: sdk-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-ios:
    name: Build iOS XCFramework
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: client/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Apple build targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/mobile

      - name: Run tests
        run: cargo test

      - name: Build XCFramework
        run: ./build_xcframework.sh

      - name: Verify artifacts
        run: |
          test -d dist/ios/rift_ffiFFI.xcframework
          test -d dist/ios/Sources/RiftSDK
          echo "iOS artifacts verified"

      - name: Package iOS SDK (tar.gz for manual download)
        run: tar -czf ios-sdk.tar.gz -C dist ios

      - name: Package XCFramework (zip for Swift Package Manager)
        run: |
          cd dist/ios
          zip -r ../../rift_ffiFFI.xcframework.zip rift_ffiFFI.xcframework

      - name: Compute XCFramework checksum
        id: checksum
        run: |
          CHECKSUM=$(swift package compute-checksum rift_ffiFFI.xcframework.zip)
          echo "checksum=$CHECKSUM" >> "$GITHUB_OUTPUT"
          echo "XCFramework checksum: $CHECKSUM"

      - uses: actions/upload-artifact@v4
        with:
          name: ios-sdk
          path: |
            client/mobile/ios-sdk.tar.gz
            client/mobile/rift_ffiFFI.xcframework.zip
          retention-days: 5

    outputs:
      checksum: ${{ steps.checksum.outputs.checksum }}

  build-android:
    name: Build Android Libraries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: client/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/mobile

      - name: Build Android SDK
        run: ./build_android.sh

      - name: Verify artifacts
        run: |
          test -d dist/android/jniLibs/arm64-v8a
          test -d dist/android/kotlin
          echo "Android artifacts verified"

      - name: Package Android SDK
        run: tar -czf android-sdk.tar.gz -C dist android

      - uses: actions/upload-artifact@v4
        with:
          name: android-sdk
          path: client/mobile/android-sdk.tar.gz
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: [build-ios, build-android]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: ios-sdk
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: android-sdk
          path: artifacts/

      - name: Determine version
        id: version
        run: |
          SDK_VERSION=$(grep '^version' client/mobile/core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          TAG="sdk-v${SDK_VERSION}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$SDK_VERSION" >> "$GITHUB_OUTPUT"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists — skipping artifact upload."
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "Will release as $TAG"
          fi

          if git ls-remote --tags origin "refs/tags/$SDK_VERSION" | grep -q "$SDK_VERSION"; then
            echo "semver_exists=true" >> "$GITHUB_OUTPUT"
            echo "SPM tag $SDK_VERSION already exists."
          else
            echo "semver_exists=false" >> "$GITHUB_OUTPUT"
            echo "Will create SPM tag $SDK_VERSION"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifacts
        if: steps.version.outputs.release_exists != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mv artifacts/ios-sdk.tar.gz "artifacts/rift-ios-sdk-${TAG}.tar.gz"
          mv artifacts/android-sdk.tar.gz "artifacts/rift-android-sdk-${TAG}.tar.gz"

      - name: Create GitHub Release
        if: steps.version.outputs.release_exists != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Rift Mobile SDK ${{ steps.version.outputs.tag }}"
          make_latest: false
          body: |
            ## Rift Mobile SDK Release

            ### iOS (Swift Package Manager)
            Add `https://github.com/saltyskip/rift` as a Swift package in Xcode. It will resolve automatically.

            ### iOS (Manual)
            Download `rift-ios-sdk-${{ steps.version.outputs.tag }}.tar.gz`, extract, and add as a local Swift package.

            ### Android (Gradle)
            Download `rift-android-sdk-${{ steps.version.outputs.tag }}.tar.gz`, extract into your project.
            Contains: jniLibs (arm64-v8a, armeabi-v7a, x86, x86_64), Kotlin bindings, `build.gradle.kts`
          files: |
            artifacts/rift-ios-sdk-${{ steps.version.outputs.tag }}.tar.gz
            artifacts/rift-android-sdk-${{ steps.version.outputs.tag }}.tar.gz
            artifacts/rift_ffiFFI.xcframework.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Package.swift and Swift sources
        id: package
        if: steps.version.outputs.release_exists != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          CHECKSUM="${{ needs.build-ios.outputs.checksum }}"
          URL="https://github.com/saltyskip/rift/releases/download/${TAG}/rift_ffiFFI.xcframework.zip"

          # Update Package.swift with release URL and checksum.
          sed -i "s|url: \".*xcframework.zip\"|url: \"${URL}\"|" Package.swift
          sed -i "s|checksum: \".*\"|checksum: \"${CHECKSUM}\"|" Package.swift

          # Extract Swift sources from the iOS SDK artifact for SPM resolution.
          mkdir -p /tmp/ios-extract
          tar -xzf "artifacts/rift-ios-sdk-${TAG}.tar.gz" -C /tmp/ios-extract
          mkdir -p client/mobile/dist/ios/Sources/RiftSDK
          rm -f client/mobile/dist/ios/Sources/RiftSDK/*.swift
          cp /tmp/ios-extract/ios/Sources/RiftSDK/*.swift client/mobile/dist/ios/Sources/RiftSDK/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Package.swift client/mobile/dist/ios/Sources/RiftSDK/
          git commit -m "Update Package.swift and Swift sources for ${TAG}" || echo "No changes"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create semver tag for SPM
        if: steps.version.outputs.semver_exists != 'true'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TARGET="${{ steps.package.outputs.sha }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(git rev-parse HEAD)
          fi

          git tag "$VERSION" "$TARGET"
          git push origin "$VERSION"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
