name: SDK Release

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:

concurrency:
  group: sdk-release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-ios:
    name: Build iOS XCFramework
    runs-on: macos-15
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdk/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Apple build targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/mobile

      - name: Run tests
        run: cargo test

      - name: Build XCFramework
        run: ./build_xcframework.sh

      - name: Verify artifacts
        run: |
          test -d dist/ios/RiftSDK.xcframework
          test -f dist/ios/Package.swift
          test -d dist/ios/Sources/RiftSDK
          echo "iOS artifacts verified"

      - name: Package iOS SDK
        run: tar -czf ios-sdk.tar.gz -C dist ios

      - uses: actions/upload-artifact@v4
        with:
          name: ios-sdk
          path: sdk/mobile/ios-sdk.tar.gz
          retention-days: 5

  build-android:
    name: Build Android Libraries
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: sdk/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/mobile

      - name: Build Android SDK
        run: ./build_android.sh

      - name: Verify artifacts
        run: |
          test -d dist/android/jniLibs/arm64-v8a
          test -d dist/android/kotlin
          echo "Android artifacts verified"

      - name: Package Android SDK
        run: tar -czf android-sdk.tar.gz -C dist android

      - uses: actions/upload-artifact@v4
        with:
          name: android-sdk
          path: sdk/mobile/android-sdk.tar.gz
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: [build-ios, build-android]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ios-sdk
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: android-sdk
          path: artifacts/

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/sdk-v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            SDK_VERSION=$(grep '^version' sdk/mobile/core/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="sdk-v${SDK_VERSION}-$(date -u +%Y%m%d).${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Rename artifacts
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mv artifacts/ios-sdk.tar.gz "artifacts/rift-ios-sdk-${TAG}.tar.gz"
          mv artifacts/android-sdk.tar.gz "artifacts/rift-android-sdk-${TAG}.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Rift Mobile SDK ${{ steps.version.outputs.tag }}"
          body: |
            ## Rift Mobile SDK Release

            ### iOS (Swift Package Manager)
            Download `rift-ios-sdk-${{ steps.version.outputs.tag }}.tar.gz`, extract, and add the directory as a local Swift package.
            Contains: `RiftSDK.xcframework`, Swift sources, `Package.swift`

            ### Android (Gradle)
            Download `rift-android-sdk-${{ steps.version.outputs.tag }}.tar.gz`, extract into your project.
            Contains: jniLibs (arm64-v8a, armeabi-v7a, x86, x86_64), Kotlin bindings, `build.gradle.kts`
          files: |
            artifacts/rift-ios-sdk-${{ steps.version.outputs.tag }}.tar.gz
            artifacts/rift-android-sdk-${{ steps.version.outputs.tag }}.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
