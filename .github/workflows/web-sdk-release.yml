name: Web SDK Release

on:
  push:
    branches: [main]
    paths:
      - 'sdk/web/src/**'
      - 'sdk/web/package.json'
  workflow_dispatch:

concurrency:
  group: web-sdk-release
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check if version is already published
        id: check
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @riftlinks/sdk@$PACKAGE_VERSION version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "$PACKAGE_VERSION" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version $PACKAGE_VERSION already published — skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Will publish version $PACKAGE_VERSION"
          fi

      - name: Publish
        if: steps.check.outputs.skip != 'true'
        run: npm publish --provenance --access public
