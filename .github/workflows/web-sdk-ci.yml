name: Web SDK CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'sdk/web/src/**'
      - 'server/src/sdk/rift.js'
  push:
    branches: [main]
    paths:
      - 'sdk/web/src/**'
      - 'server/src/sdk/rift.js'

jobs:
  build:
    name: Web SDK Build & Sync Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify server IIFE is in sync
        run: |
          diff dist/index.global.js ../../server/src/sdk/rift.js || {
            echo "::error::server/src/sdk/rift.js is out of date. Run: cd sdk/web && npm run build && cp dist/index.global.js ../../server/src/sdk/rift.js"
            exit 1
          }
